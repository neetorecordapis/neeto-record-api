version: v1.0
fail_fast: true
plan: standard-2

paths:
  - api-reference-v1/**
  - api-reference/**
  - docs-v1/**
  - docs/**
  - getting-started/**
  - snippets/**
  - schemas/**
  - assets/**
  - scripts/**
  - bundled-v1/**
  - bundled/**
  - docs.json
  - theme.css
  - package.json
  - yarn.lock
  - .neetoci/default.yml
  - .neetoci/scripts/*

commands:
  - checkout
  - neetoci-version node 22.13
  - cache restore
  - yarn install
  - cache store
  - yarn build
  - bash .neetoci/scripts/check_links.sh
  - bash .neetoci/scripts/validate_bundled.sh

triggers:
  - event: pull_request
