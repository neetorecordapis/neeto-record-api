openapi: 3.0.3
info:
  title: NeetoRecord Recordings APIs
  version: 2.0.0
servers:
  - description: NeetoRecord APIs
    url: https://{your-subdomain}.neetorecord.com/api/external/v2
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/workspace-subdomain).
tags:
  - name: Recordings
    description: APIs to list recordings in your workspace.
paths:
  /recordings:
    get:
      summary: List all recordings
      tags:
        - Recordings
      description: List all recordings.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - $ref: '#/components/parameters/page_number_param'
        - $ref: '#/components/parameters/page_size_param'
      responses:
        '200':
          description: Successfully retrieved recordings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/recording_list_response'
              example:
                recordings:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    title: Product demo walkthrough
                    default_title: Recording 2026-02-15
                    duration: 125.5
                    view_count: 42
                    is_uploaded: true
                    requested: false
                    summary: Overview of the main features and how to get started with the product.
                    public_link_id: x9y8z7w6v5u4t3s2
                    created_at: '2026-02-15T10:30:00.000Z'
                    updated_at: '2026-02-15T11:45:00.000Z'
                    uploaded_at: '2026-02-15T10:35:00.000Z'
                    public_url: https://your-workspace.neetorecord.com/watch/x9y8z7w6v5u4t3s2
                    transcoded_url: https://cdn.neetorecord.com/recordings/a1b2c3d4/transcoded.m3u8?signature=...
                    thumbnail_url: https://cdn.example.com/thumbnails/a1b2c3d4-e5f6-7890-abcd-ef1234567890.jpg?v=1
                    user_name: Jane Smith
                    tags:
                      - id: tag-001
                        name: Demo
                        style: blue
                    folder_name: Sales
                    folder_id: f1a2b3c4-d5e6-7890-abcd-ef1234567890
                  - id: b2c3d4e5-f6a7-8901-bcde-f23456789012
                    title: Sprint planning meeting
                    default_title: Recording 2026-02-14
                    duration: 1842
                    view_count: 5
                    is_uploaded: true
                    requested: true
                    summary: Transcript too brief to summarize meaningfully.
                    public_link_id: a1b2c3d4e5f6g7h8
                    created_at: '2026-02-14T09:00:00.000Z'
                    updated_at: '2026-02-14T09:52:00.000Z'
                    uploaded_at: '2026-02-14T09:15:00.000Z'
                    public_url: https://your-workspace.neetorecord.com/watch/a1b2c3d4e5f6g7h8
                    transcoded_url: null
                    thumbnail_url: https://cdn.example.com/thumbnails/b2c3d4e5-f6a7-8901-bcde-f23456789012.jpg?v=1
                    user_name: John Doe
                    tags: []
                    folder_name: null
                    folder_id: null
                pagination:
                  total_records: 150
                  total_pages: 5
                  current_page_number: 1
                  page_size: 30
  /recordings/{id}/screenshot:
    get:
      summary: Get a screenshot at a timestamp
      tags:
        - Recordings
      description: Extracts a still frame of the recording at the given timestamp and returns a presigned URL to the image. If `is_screenshot_ready` is `false`, the recording's downloadable video is not up to date yet — call `POST /recordings/{id}/trigger-mp4` to regenerate it, then retry.
      parameters:
        - $ref: '#/components/parameters/api_key_header'
        - $ref: '#/components/parameters/accept_header'
        - in: path
          name: id
          required: true
          description: The recording ID (`public_link_id`) from the watch URL.
          schema:
            type: string
        - in: query
          name: timestamp
          required: true
          description: Timestamp in seconds (may be fractional) of the frame to capture.
          schema:
            type: number
            minimum: 0
        - in: query
          name: image_format
          required: false
          description: 'Image format: `png` or `jpeg`. Defaults to `png`.'
          schema:
            type: string
            enum:
              - png
              - jpeg
            default: png
      responses:
        '200':
          description: Screenshot URL generated, or not ready yet.
          content:
            application/json:
              schema:
                type: object
                properties:
                  recording_id:
                    type: string
                  timestamp:
                    type: number
                  image_format:
                    type: string
                  is_screenshot_ready:
                    type: boolean
                    description: '`false` when the recording''s video file is outdated. Call `POST /recordings/{id}/trigger-mp4` to regenerate it, then retry.'
                  screenshot_url:
                    type: string
                    description: Presigned URL to the image. Present only when `is_screenshot_ready` is `true`.
                  url_expires_in_seconds:
                    type: integer
              example:
                recording_id: x9y8z7w6v5u4t3s2
                timestamp: 12.5
                image_format: png
                is_screenshot_ready: true
                screenshot_url: https://neeto-record-transcoded-recordings.s3.amazonaws.com/.../frames/12500.png?X-Amz-Signature=...
                url_expires_in_seconds: 600
        '422':
          description: Invalid timestamp or image format, recording still processing, or extraction failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: Timestamp must be a number between 0 and 125.5 seconds.
components:
  parameters:
    api_key_header:
      in: header
      name: X-Api-Key
      description: API key. Refer to [Authentication](/getting-started/authentication) for more information.
      required: true
      schema:
        type: string
    accept_header:
      in: header
      name: Accept
      description: Must be `application/json`.
      required: true
      schema:
        type: string
        enum:
          - application/json
        default: application/json
    page_number_param:
      in: query
      name: page_number
      description: Page number. If absent, all results are returned.
      required: false
      schema:
        type: integer
    page_size_param:
      in: query
      name: page_size
      description: Number of results per page. Defaults to 30.
      required: false
      schema:
        type: integer
  schemas:
    tag:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tag.
        name:
          type: string
          description: Name of the tag.
        style:
          type: string
          description: Style/color of the tag.
    recording:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the recording.
        title:
          type: string
          nullable: true
          description: Custom title set by the user.
        default_title:
          type: string
          description: Auto-generated title for the recording.
        duration:
          type: number
          nullable: true
          description: Duration of the recording in seconds.
        view_count:
          type: integer
          description: Number of times the recording has been viewed.
        is_uploaded:
          type: boolean
          description: Whether the recording has been fully uploaded.
        requested:
          type: boolean
          description: Whether the recording was requested from someone.
        summary:
          type: string
          nullable: true
          description: AI-generated summary of the recording.
        public_link_id:
          type: string
          nullable: true
          description: Public link identifier used in the watch URL.
        public_url:
          type: string
          nullable: true
          description: Public watch URL for the recording.
        transcoded_url:
          type: string
          nullable: true
          description: CloudFront signed URL for the transcoded video.
        thumbnail_url:
          type: string
          nullable: true
          description: URL for the recording thumbnail image.
        user_name:
          type: string
          description: Display name of the user who created the recording.
        tags:
          type: array
          items:
            $ref: '#/components/schemas/tag'
          description: Tags associated with the recording.
        folder_name:
          type: string
          nullable: true
          description: Name of the folder containing the recording.
        folder_id:
          type: string
          nullable: true
          description: Unique identifier of the folder containing the recording.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the recording was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the recording was last updated.
        uploaded_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the recording was uploaded.
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
          example: 95
        total_pages:
          type: integer
          description: Total number of pages available.
          example: 4
        current_page_number:
          type: integer
          description: Current page number.
          example: 1
        page_size:
          type: integer
          description: Number of records per page.
          example: 30
    recording_list_response:
      type: object
      properties:
        recordings:
          type: array
          items:
            $ref: '#/components/schemas/recording'
          description: List of recordings.
        pagination:
          $ref: '#/components/schemas/pagination'
