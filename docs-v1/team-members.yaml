openapi: 3.0.3
info:
  title: NeetoRecord Team Members APIs
  version: 1.0.0

servers:
  $ref: '../schemas/common-v1.yaml#/servers'

tags:
  - name: Team Members
    description: APIs to manage team members in the workspace.

paths:
  /team_members:
    get:
      summary: List team members
      tags:
        - Team Members
      description: List team members in the workspace.
      parameters:
        - $ref: '../schemas/common-v1.yaml#/api_key_header'
        - $ref: '../schemas/common-v1.yaml#/accept_header'
        - in: query
          name: email
          description: Filter team members by email address.
          required: false
          schema:
            type: string
            format: email
            example: "oliver@example.com"
        - $ref: '../schemas/common-v1.yaml#/page_number_param'
        - $ref: '../schemas/common-v1.yaml#/page_size_param'
      responses:
        '200':
          description: OK - Request succeeded
          content:
            application/json:
              schema:
                $ref: '../schemas/team-member.yaml#/components/schemas/team_member_list_response'

    post:
      summary: Add team members
      tags:
        - Team Members
      description: Add team members to the workspace.
      parameters:
        - $ref: '../schemas/common-v1.yaml#/api_key_header'
        - $ref: '../schemas/common-v1.yaml#/accept_header'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                organization_role:
                  type: string
                  description: Role that should be assigned to the new team members. It must be a valid role from the "Roles" section in the settings page. The default is "Standard".
                  example: "Standard"
                emails:
                  type: array
                  items:
                    type: string
                    format: email
                  description: Emails of the team members to be added in the workspace in array format. Must be valid emails.
                  example: ["oliver@example.com", "jane@example.com"]
                invited_by:
                  type: string
                  format: email
                  description: Email of the admin sending the invitation. Defaults to the most recent workspace admin if not specified.
                  example: admin@example.com
                send_invitation_email:
                  type: string
                  description: Set to "false" to skip sending invitation emails. Defaults to sending emails if not specified.
                  enum:
                    - 'true'
                    - 'false'
                  default: 'true'
              required:
                - emails
      responses:
        '200':
          description: OK - Users added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Users added successfully"

  /team_members/{team_member_id}:
    delete:
      summary: Remove team member
      tags:
        - Team Members
      description: Remove team members from the workspace.
      parameters:
        - $ref: '../schemas/common-v1.yaml#/api_key_header'
        - $ref: '../schemas/common-v1.yaml#/accept_header'
        - in: path
          name: team_member_id
          description: Id of the team member that you want to remove. You can get `team_member_id` by listing all team members using our [List team members](/api-reference-v1/team-members/list) API. Here you will see id for each team member.
          required: true
          schema:
            type: string
            format: uuid
            example: "aaaabbbb-cccc-dddd-eeee-ffff00001111"
      responses:
        '200':
          description: OK - Team member removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Team member has been removed"
        '422':
          description: Unprocessable Entity - Cannot remove the last admin of the workspace
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cannot remove the last admin of the workspace"

    patch:
      summary: Update team member details
      tags:
        - Team Members
      description: Update a team member.
      parameters:
        - $ref: '../schemas/common-v1.yaml#/api_key_header'
        - $ref: '../schemas/common-v1.yaml#/accept_header'
        - in: path
          name: team_member_id
          description: Id of the team member that you want to update. You can get `team_member_id` by listing all team members using our [List team members](/api-reference-v1/team-members/list) API. Here you will see id for each team member.
          required: true
          schema:
            type: string
            format: uuid
            example: "aaaabbbb-cccc-dddd-eeee-ffff00001111"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email of the team member.
                  example: "oliver@example.com"
                first_name:
                  type: string
                  description: First name of the team member.
                  example: "Oliver"
                last_name:
                  type: string
                  description: Last name of the team member.
                  example: "Smith"
                time_zone:
                  type: string
                  description: Time zone for the team member. It should be a valid time zone.
                  example: "Asia/Kolkata"
                organization_role:
                  type: string
                  description: Organization role for the team member. This value should be one of the organization roles of your workspace. The list of organization roles can be seen in Roles page. This value is case sensitive.
                  example: "Admin"
      responses:
        '200':
          description: OK - Request succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  team_member:
                    $ref: '../schemas/team-member.yaml#/components/schemas/team_member'
