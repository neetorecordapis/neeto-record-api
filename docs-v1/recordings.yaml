openapi: 3.0.3
info:
  title: NeetoRecord Recordings APIs
  version: 1.0.0

servers:
  $ref: '../schemas/common-v1.yaml#/servers'

tags:
  - name: Recordings
    description: APIs to list recordings in your workspace.

paths:
  /recordings:
    get:
      summary: List all recordings
      tags:
        - Recordings
      description: List all recordings.
      parameters:
        - $ref: '../schemas/common-v1.yaml#/api_key_header'
        - $ref: '../schemas/common-v1.yaml#/accept_header'
        - $ref: '../schemas/common-v1.yaml#/page_number_param'
        - $ref: '../schemas/common-v1.yaml#/page_size_param'
      responses:
        '200':
          description: Successfully retrieved recordings.
          content:
            application/json:
              schema:
                $ref: '../schemas/recording-v1.yaml#/components/schemas/recording_list_response'
              example:
                recordings:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    title: "Product demo walkthrough"
                    duration: 125.5
                    view_count: 42
                    is_uploaded: true
                    requested: false
                    summary: "Overview of the main features and how to get started with the product."
