# Server configuration used across all endpoints
servers:
  - description: NeetoRecord APIs
    url: https://{your-subdomain}.neetorecord.com/api/external/v1
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/workspace-subdomain).

# Common API Key header parameter
api_key_header:
  in: header
  name: X-Api-Key
  description: API key. Refer to [Authentication](/getting-started/authentication) for more information.
  required: true
  schema:
    type: string

# Common Accept header parameter
accept_header:
  in: header
  name: Accept
  description: Must be `application/json`.
  required: true
  schema:
    type: string
    enum: ['application/json']
    default: 'application/json'

# Common pagination parameters
page_number_param:
  in: query
  name: page_number
  description: Page number. If absent, all results are returned.
  required: false
  schema:
    type: integer

page_size_param:
  in: query
  name: page_size
  description: Number of results per page. Defaults to 30.
  required: false
  schema:
    type: integer

# Common pagination parameters
pagination_parameters:
  - in: query
    name: page_number
    description: Page number. If absent, all results are returned.
    required: false
    schema:
      type: integer
  - in: query
    name: page_size
    description: Number of results per page. Defaults to 30.
    required: false
    schema:
      type: integer

components:
  schemas:
    # Pagination object structure (for NeetoRecord APIs)
    pagination:
      type: object
      properties:
        total_records:
          type: integer
          description: Total number of records.
        total_pages:
          type: integer
          description: Total number of pages available.
        current_page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of records per page.
